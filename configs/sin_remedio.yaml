# Configuración para el corpus de Sin remedio (Antonio Caballero, 1984)
# Ambientación: Bogotá D.E., 1972
#
# Este archivo concentra todos los catálogos y parámetros del proyecto.
# Modificándolo, el toolkit puede analizar otra obra sin tocar el código.

proyecto:
  nombre: "Sin remedio · Antonio Caballero"
  ambientacion: "Bogotá D.E., 1972"
  autor: "Antonio Caballero"
  año_publicacion: 1984

# -------- Corpus --------
corpus:
  ruta_default: "data/corpus.txt"
  chapter_regex: '={20,}\s*\n(CAPÍTULO\s+[IVXLC]+)\s*\n={20,}'
  paragraph_marker: '\[P-(\d+)\]'
  auto_split_paragraphs: false

# -------- Polaridad (qué categoría es qué) --------
# El cruce afectivo se apoya en estas listas. Cambiarlas reasigna las polaridades.
polaridad:
  Negativa:
    - Tristeza
    - Ira/Enojo
    - Miedo
    - Angustia existencial
    - Muerte
    - Violencia
  Positiva:
    - Alegría
    - Deseo/Erotismo
  Tensión social:
    - Clasismo
    - Homofobia
    - Machismo
  Neutra:
    - Paternidad/Maternidad
    - Referencia de lugares
    - Referencia poética/metapoética
    - Sustancias psicoactivas

# Categorías a considerar para "emoción dominante" (excluye neutras puras)
afectivas_dominantes:
  - Tristeza
  - Ira/Enojo
  - Miedo
  - Angustia existencial
  - Muerte
  - Violencia
  - Alegría
  - Deseo/Erotismo
  - Clasismo

# Colores hex por emoción
emo_color:
  Tristeza: "3F6CC7"
  "Angustia existencial": "5E4B8B"
  Muerte: "37474F"
  Miedo: "7B1FA2"
  "Ira/Enojo": "D32F2F"
  Violencia: "B71C1C"
  Alegría: "2E9E5B"
  "Deseo/Erotismo": "E0529C"
  Clasismo: "8B5A2B"
  Homofobia: "8B5A2B"
  Machismo: "8B5A2B"

